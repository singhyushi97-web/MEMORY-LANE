<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday My Gurl! 🎉</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Comic Sans MS', cursive;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4);
      position:relative;
    }

    .container{
      text-align:center;
      background:rgba(255,255,255,0.2);
      padding:40px;
      border-radius:25px;
      backdrop-filter:blur(10px);
      width:90%;
      max-width:700px;
      z-index:10;
      box-shadow:0 8px 30px rgba(0,0,0,0.2);
    }

    h1{
      color:#ff1493;
      font-size:3rem;
      margin-bottom:20px;
      animation:bounce 1.5s ease;
      text-shadow:0 0 10px white;
    }

    .subtitle{
      color:#8a2be2;
      font-size:1.4rem;
      margin-bottom:30px;
      animation:fadeIn 2s ease;
    }

    .next-button{
      padding:15px 35px;
      border:none;
      border-radius:50px;
      background:linear-gradient(45deg,#ff1493,#8a2be2);
      color:white;
      font-size:1.2rem;
      cursor:pointer;
      transition:0.3s;
    }

    .next-button:hover{
      transform:scale(1.08);
    }

    .audio-controls{
      position:fixed;
      bottom:20px;
      right:20px;
      background:white;
      padding:10px 15px;
      border-radius:50px;
      display:flex;
      align-items:center;
      gap:10px;
      z-index:100;
    }

    .audio-controls button{
      border:none;
      background:none;
      font-size:1.4rem;
      cursor:pointer;
    }

    .floating{
      position:absolute;
      top:-50px;
      animation:fall linear forwards;
      pointer-events:none;
      z-index:1;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(360deg);
      }
    }

    @keyframes bounce{
      0%{
        transform:scale(0);
      }
      60%{
        transform:scale(1.1);
      }
      100%{
        transform:scale(1);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    @media(max-width:768px){
      h1{
        font-size:2rem;
      }

      .subtitle{
        font-size:1rem;
      }

      .next-button{
        font-size:1rem;
        padding:12px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>
      Happy Birthday <br>
      My Gurl! 🎂✨
    </h1>

    <p class="subtitle">
      Hey Bestie! Ready for your special surprise? 💖
    </p>

    <button class="next-button" onclick="goToNextPage()">
      Let's Go ✨
    </button>
  </div>

  <div class="audio-controls">
    <button id="playBtn">▶️</button>

    <input 
      type="range"
      id="volume"
      min="0"
      max="1"
      step="0.1"
      value="0.5"
    >
  </div>

  <!-- AUDIO -->
  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>

    // MUSIC
    const music = document.getElementById("music");
    const playBtn = document.getElementById("playBtn");
    const volume = document.getElementById("volume");

    music.volume = 0.5;

    let playing = false;

    // autoplay after first click
    document.body.addEventListener("click", () => {
      if(!playing){
        music.play();
        playing = true;
        playBtn.innerHTML = "⏸️";
      }
    }, { once:true });

    playBtn.addEventListener("click", () => {

      if(playing){
        music.pause();
        playBtn.innerHTML = "▶️";
      }else{
        music.play();
        playBtn.innerHTML = "⏸️";
      }

      playing = !playing;
    });

    volume.addEventListener("input", () => {
      music.volume = volume.value;
    });


    // NEXT PAGE
    function goToNextPage(){

      // Change this to your next file
      window.location.href = "memorylane.html";

      // OR use:
      // alert("Next page coming soon!");
    }


    // FLOATING EMOJIS
    function createFloating(){

      const emojis = ["🎈","✨","💖","🎉","🌸"];

      const el = document.createElement("div");

      el.classList.add("floating");

      el.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

      el.style.left = Math.random()*100 + "vw";

      el.style.fontSize = (20 + Math.random()*30) + "px";

      el.style.animationDuration = (4 + Math.random()*6) + "s";

      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      },10000);
    }

    setInterval(createFloating,300);

  </script>

</body>
</html>
